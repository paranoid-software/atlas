# Deployment compose — uses the PUBLISHED image (no build, no bind-mount), attached to the
# external "primary" network (your shared network where the reverse proxy lives). Create it
# once if it doesn't exist:  docker network create primary
#
#   docker compose -f docker-compose.deploy.yml up -d
#
# Pin an immutable tag instead of `latest` for reproducible deploys (CI tags every image
# yyyymmdd.<run>):  ATLAS_IMAGE_TAG=20260619.42 docker compose -f docker-compose.deploy.yml up -d
# Ingress on the `primary` network handles how it's exposed publicly. The `ports`
# line below is optional host access for testing — drop it when the proxy fronts it.
services:
  atlas-site:
    image: ghcr.io/paranoid-software/atlas:${ATLAS_IMAGE_TAG:-latest}
    container_name: atlas-site
    restart: unless-stopped
    networks:
      - primary
    ports:
      - "8088:80"   # optional — remove when reached via the proxy on `primary`

networks:
  primary:
    external: true
