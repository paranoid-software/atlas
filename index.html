<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlas — a spec-driven framework for AI-assisted, multi-repo projects</title>
  <meta name="description" content="Atlas is a tool-agnostic, spec-driven framework for running large, multi-repo, AI-assisted projects." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <button class="menu-toggle" aria-label="Toggle navigation">☰</button>
  <div class="backdrop"></div>

  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <span class="logo"><a href="#/README.md">Atlas</a></span>
        <span class="ver">framework</span>
      </div>
      <p class="tagline">A spec-driven framework for AI-assisted, multi-repo projects.</p>
      <nav id="nav"></nav>
    </aside>

    <main class="main">
      <article class="content" id="content">
        <p>Loading…</p>
      </article>
    </main>
  </div>

  <!-- Single runtime dependency: the marked markdown parser (pinned), from jsdelivr. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
  (function () {
    "use strict";

    // Reading order. Each entry: { path, label, num?, group }
    var DOCS = [
      { path: "README.md",                          label: "Overview",               group: "Start here" },
      { path: "method/README.md",                   label: "Method overview",        group: "The framework" },
      { path: "method/01-the-atlas.md",             label: "The Atlas model",        num: "01", group: "The framework" },
      { path: "method/02-stores-model.md",          label: "The stores model",       num: "02", group: "The framework" },
      { path: "method/03-atlas-anatomy.md",         label: "Atlas anatomy",          num: "03", group: "The framework" },
      { path: "method/04-spec-lifecycle.md",        label: "The SPEC lifecycle",     num: "04", group: "The framework" },
      { path: "method/05-discipline.md",            label: "The discipline",         num: "05", group: "The framework" },
      { path: "method/06-bootstrap.md",             label: "Bootstrap recipe",       num: "06", group: "The framework" },
      { path: "method/07-optional-git-versioning.md", label: "Optional git-versioning", num: "07", group: "The framework" },
      { path: "STRUCTURE.md",                        label: "Repository structure",   group: "Reference" }
    ];
    var KNOWN = {};
    DOCS.forEach(function (d) { KNOWN[d.path] = d; });

    var contentEl = document.getElementById("content");
    var navEl = document.getElementById("nav");
    var cache = {};

    // --- Build the sidebar nav, grouped, preserving order ---
    (function buildNav() {
      var lastGroup = null;
      DOCS.forEach(function (d) {
        if (d.group !== lastGroup) {
          var g = document.createElement("div");
          g.className = "nav-group-label";
          g.textContent = d.group;
          navEl.appendChild(g);
          lastGroup = d.group;
        }
        var a = document.createElement("a");
        a.className = "nav-link";
        a.href = "#/" + d.path;
        a.dataset.path = d.path;
        a.innerHTML = (d.num ? '<span class="num">' + d.num + "</span>" : "") + escapeHtml(d.label);
        navEl.appendChild(a);
      });
    })();

    function escapeHtml(s) {
      return s.replace(/[&<>"]/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
      });
    }

    // Normalize a path with ./ and ../ segments against a base directory.
    function resolvePath(baseDir, href) {
      var stack = baseDir ? baseDir.split("/") : [];
      href.split("/").forEach(function (part) {
        if (part === "" || part === ".") return;
        if (part === "..") stack.pop();
        else stack.push(part);
      });
      return stack.join("/");
    }

    function dirOf(path) {
      var i = path.lastIndexOf("/");
      return i === -1 ? "" : path.slice(0, i);
    }

    function currentPath() {
      var h = location.hash.replace(/^#\/?/, "");
      return KNOWN[h] ? h : "README.md";
    }

    function setActive(path) {
      var links = navEl.querySelectorAll("a.nav-link");
      for (var i = 0; i < links.length; i++) {
        links[i].classList.toggle("active", links[i].dataset.path === path);
      }
    }

    // Rewrite intra-repo .md links to in-app hash routes; resolve relative paths.
    function rewriteLinks(path) {
      var baseDir = dirOf(path);
      var anchors = contentEl.querySelectorAll("a[href]");
      for (var i = 0; i < anchors.length; i++) {
        var a = anchors[i];
        var href = a.getAttribute("href");
        if (!href) continue;
        if (/^[a-z]+:\/\//i.test(href) || href.indexOf("//") === 0 || href.indexOf("mailto:") === 0) {
          a.target = "_blank"; a.rel = "noopener"; continue;
        }
        if (href.charAt(0) === "#") continue; // in-page anchor
        var clean = href.split("#")[0];
        if (!/\.md$/i.test(clean)) continue;
        var resolved = resolvePath(baseDir, clean);
        if (KNOWN[resolved]) a.setAttribute("href", "#/" + resolved);
      }
    }

    // Add ids to headings (for potential deep links / TOC later).
    function addHeadingIds() {
      var hs = contentEl.querySelectorAll("h2, h3");
      for (var i = 0; i < hs.length; i++) {
        if (hs[i].id) continue;
        hs[i].id = hs[i].textContent.toLowerCase().replace(/[^\w]+/g, "-").replace(/^-+|-+$/g, "");
      }
    }

    function render(md, path) {
      contentEl.innerHTML = marked.parse(md);
      rewriteLinks(path);
      addHeadingIds();
      var doc = KNOWN[path];
      var footer = document.createElement("div");
      footer.className = "doc-footer";
      footer.innerHTML =
        '<span>Atlas — MIT. Rendered from <code>' + escapeHtml(path) + "</code> (single source of truth).</span>";
      contentEl.appendChild(footer);
      document.title = (doc ? doc.label + " · " : "") + "Atlas";
      contentEl.parentElement.scrollTop = 0;
      window.scrollTo(0, 0);
    }

    function load() {
      var path = currentPath();
      setActive(path);
      document.body.classList.remove("nav-open");
      if (cache[path]) { render(cache[path], path); return; }
      contentEl.innerHTML = "<p>Loading…</p>";
      fetch(path, { cache: "no-cache" })
        .then(function (r) { if (!r.ok) throw new Error(r.status + " " + r.statusText); return r.text(); })
        .then(function (text) { cache[path] = text; render(text, path); })
        .catch(function (err) {
          contentEl.innerHTML =
            '<h1>Couldn’t load this page</h1><p id="error">' + escapeHtml(path) + " — " + escapeHtml(err.message) +
            "</p><p>This site reads the repo’s markdown over HTTP. Open it via a static server " +
            "(e.g. GitHub Pages, or <code>python3 -m http.server</code>), not directly from <code>file://</code>.</p>";
        });
    }

    if (typeof marked === "undefined") {
      contentEl.innerHTML =
        '<h1>Markdown renderer failed to load</h1><p id="error">The <code>marked</code> library ' +
        "(jsdelivr CDN) could not be reached. Check your connection, or vendor it locally.</p>";
    } else {
      window.addEventListener("hashchange", load);
      // Mobile nav toggle
      document.querySelector(".menu-toggle").addEventListener("click", function () {
        document.body.classList.toggle("nav-open");
      });
      document.querySelector(".backdrop").addEventListener("click", function () {
        document.body.classList.remove("nav-open");
      });
      load();
    }
  })();
  </script>
</body>
</html>
